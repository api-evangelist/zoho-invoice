aid: zoho-invoice
name: Zoho Invoice
description: >-
  Zoho Invoice is a cloud-based invoicing application for small businesses
  and freelancers that supports customer management, estimates, invoices,
  recurring billing, expense tracking, time tracking, and online payment
  collection. The Zoho Invoice REST API provides full CRUD access to
  organizations, contacts, items, invoices, estimates, credit notes, expenses,
  projects, time entries, and customer payments. Authentication uses OAuth
  2.0 with region-specific data center domains (.com, .eu, .in, .com.au, .jp,
  .ca, .com.cn, .sa).
type: Index
